syntax = "proto3";

package order.v1.request;

import "google/api/field_behavior.proto";
import "validate/validate.proto";
import "order/v1/types/enums/order_status.proto";
import "order/v1/types/enums/payment_mode.proto";
import "payment/v1/types/enums/payout.proto";

option go_package = "github.com/arm-1234/protos/order/v1/request;request";

message OrderLineItem {
  string product_id = 1 [(validate.rules).string.min_len = 1];
  int32 quantity = 2 [(validate.rules).int32.gte = 1];
}

// PlaceOrderRequest: user_id is taken from the authenticated caller.
message PlaceOrderRequest {
  string merchant_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 1
  ];
  repeated OrderLineItem items = 2 [(validate.rules).repeated.min_items = 1];
  order.v1.types.enums.PaymentMode payment_mode = 3 [
    (validate.rules).enum = {defined_only: true, not_in: [0]}
  ];
  // Caller's current location, used for the proximity (geofence) check.
  double user_latitude = 4 [(validate.rules).double = {gte: -90, lte: 90}];
  double user_longitude = 5 [(validate.rules).double = {gte: -180, lte: 180}];
  payment.v1.types.enums.PayoutMode payout_mode = 6;
}

message GetOrderRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
}

message ListMyOrdersRequest {
  int64 page_number = 1;
  int64 page_size = 2;
}

message ListMerchantOrdersRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
  order.v1.types.enums.OrderStatus status = 2; // optional filter
  int64 page_number = 3;
  int64 page_size = 4;
}

message UpdateOrderStatusRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
  order.v1.types.enums.OrderStatus status = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).enum = {defined_only: true, not_in: [0]}
  ];
}
