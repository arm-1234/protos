syntax = "proto3";

package payment.v1;

import "google/api/annotations.proto";
import "errors/errors.proto";
import "payment/v1/request/payment_request.proto";
import "payment/v1/response/payment_response.proto";

option go_package = "github.com/arm-1234/protos/payment/v1;v1";

service Payment {
  rpc InitiatePayment (payment.v1.request.InitiatePaymentRequest) returns (payment.v1.response.InitiatePaymentResponse) {
    option (google.api.http) = {
      post: "/v1/orders/{order_id}/payments"
      body: "*"
    };
  }

  rpc VerifyPayment (payment.v1.request.VerifyPaymentRequest) returns (payment.v1.response.VerifyPaymentResponse) {
    option (google.api.http) = {
      post: "/v1/orders/{order_id}/payments/{payment_id}/verify"
      body: "*"
    };
  }

  rpc GetPaymentStatus (payment.v1.request.GetPaymentStatusRequest) returns (payment.v1.response.GetPaymentStatusResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{order_id}/payments/{payment_id}"
    };
  }

  rpc RequestInstantPayout (payment.v1.request.RequestInstantPayoutRequest) returns (payment.v1.response.RequestInstantPayoutResponse) {
    option (google.api.http) = {
      post: "/v1/orders/{order_id}/payout:instant"
      body: "*"
    };
  }

  rpc GetPayout (payment.v1.request.GetPayoutRequest) returns (payment.v1.response.GetPayoutResponse) {
    option (google.api.http) = {
      get: "/v1/orders/{order_id}/payout"
    };
  }
}

enum ErrorReason {
  option (errors.default_code) = 500;
  PAYMENT_UNSPECIFIED = 0 [(errors.code) = 500];
  PAYMENT_ORDER_NOT_FOUND = 1 [(errors.code) = 404];
  PAYMENT_NOT_FOUND = 2 [(errors.code) = 404];
  PAYMENT_INVALID_REQUEST = 3 [(errors.code) = 400];
  PAYMENT_GATEWAY_ERROR = 4 [(errors.code) = 502];
  PAYMENT_VERIFICATION_FAILED = 5 [(errors.code) = 400];
  PAYMENT_PAYOUT_NOT_FOUND = 6 [(errors.code) = 404];
  PAYMENT_PAYOUT_NOT_ALLOWED = 7 [(errors.code) = 409];
}
