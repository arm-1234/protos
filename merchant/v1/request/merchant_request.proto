syntax = "proto3";

package merchant.v1.request;

import "google/api/field_behavior.proto";
import "validate/validate.proto";

option go_package = "github.com/arm-1234/protos/merchant/v1/request;request";

message OnboardMerchantRequest {
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 1
  ];
  string phone = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string = {min_len: 8, max_len: 15}
  ];
  string store_name = 3 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 1
  ];
  string description = 4;
  string logo_url = 5;
  string address = 6;
  // UPI VPA parsed from the merchant's payment QR, e.g. "shop@paytm".
  string upi_vpa = 7 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.pattern = "^[a-zA-Z0-9.\\-_]{2,256}@[a-zA-Z]{2,64}$"
  ];
  // Store location (optional). Required only if you want geofenced ordering.
  double latitude = 8 [(validate.rules).double = {gte: -90, lte: 90}];
  double longitude = 9 [(validate.rules).double = {gte: -180, lte: 180}];
}

message GetMerchantRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
}

// UPI VPAs are managed via the dedicated Add/Remove/SetPrimary VPA RPCs, not here.
message UpdateMerchantRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
  string name = 2;
  string store_name = 3;
  string description = 4;
  string logo_url = 5;
  string address = 6;
  double latitude = 8 [(validate.rules).double = {gte: -90, lte: 90}];
  double longitude = 9 [(validate.rules).double = {gte: -180, lte: 180}];
}

message ResolveStoreByVpaRequest {
  string vpa = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 3
  ];
}

message ListMerchantVpasRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
}

message AddMerchantVpaRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
  string vpa = 2 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.pattern = "^[a-zA-Z0-9.\\-_]{2,256}@[a-zA-Z]{2,64}$"
  ];
  string label = 3;
  // Make this the new primary VPA (used for the store's QR/display).
  bool make_primary = 4;
}

message RemoveMerchantVpaRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
  string vpa_id = 2 [(validate.rules).string.min_len = 1];
}

message SetPrimaryMerchantVpaRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
  string vpa_id = 2 [(validate.rules).string.min_len = 1];
}
