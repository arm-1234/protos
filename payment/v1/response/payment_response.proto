syntax = "proto3";

package payment.v1.response;

import "payment/v1/types/payment.proto";

option go_package = "github.com/arm-1234/protos/payment/v1/response;response";

message InitiatePaymentResponse {
  payment.v1.types.PaymentInfo payment = 1;
  // Neutral checkout parameters the client hands to the provider's checkout.
  // Provider-specific ids are mapped into these by the server-side adapter.
  string provider = 2;
  string provider_ref = 3;
  string provider_key = 4;
  int64 amount_minor = 5;
}

message VerifyPaymentResponse {
  payment.v1.types.PaymentInfo payment = 1;
  bool verified = 2;
}

message GetPaymentStatusResponse {
  payment.v1.types.PaymentInfo payment = 1;
}

message RequestInstantPayoutResponse {
  payment.v1.types.PayoutInfo payout = 1;
}

message GetPayoutResponse {
  payment.v1.types.PayoutInfo payout = 1;
}
