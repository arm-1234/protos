syntax = "proto3";

package payment.v1.request;

import "google/api/field_behavior.proto";
import "validate/validate.proto";

option go_package = "github.com/arm-1234/protos/payment/v1/request;request";

message InitiatePaymentRequest {
  string order_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 1
  ];
}

message VerifyPaymentRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
  string payment_id = 2 [(validate.rules).string.min_len = 1];
  string provider_payment_id = 3 [(validate.rules).string.min_len = 1];
  string checkout_token = 4 [(validate.rules).string.min_len = 1];
}

message GetPaymentStatusRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
  string payment_id = 2 [(validate.rules).string.min_len = 1];
}

message RequestInstantPayoutRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
}

message GetPayoutRequest {
  string order_id = 1 [(validate.rules).string.min_len = 1];
}
