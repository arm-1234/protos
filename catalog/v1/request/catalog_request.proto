syntax = "proto3";

package catalog.v1.request;

import "google/api/field_behavior.proto";
import "validate/validate.proto";
import "catalog/v1/types/enums/product_sort_by.proto";

option go_package = "github.com/arm-1234/protos/catalog/v1/request;request";

message CreateProductRequest {
  // merchant_id is taken from the authenticated caller; ignored if sent.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 1
  ];
  string description = 2;
  string image_url = 3;
  double price = 4 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).double.gt = 0
  ];
  string currency = 5 [(validate.rules).string = {ignore_empty: true, len: 3}];
}

// ProductDraft is one product in a bulk create.
message ProductDraft {
  string name = 1 [(validate.rules).string.min_len = 1];
  string description = 2;
  string image_url = 3;
  double price = 4 [(validate.rules).double.gt = 0];
  string currency = 5 [(validate.rules).string = {ignore_empty: true, len: 3}];
}

// BatchCreateProductsRequest creates many products for the caller's merchant.
message BatchCreateProductsRequest {
  repeated ProductDraft products = 1 [(validate.rules).repeated = {min_items: 1, max_items: 200}];
}

message GetProductRequest {
  string product_id = 1 [(validate.rules).string.min_len = 1];
}

message UpdateProductRequest {
  string product_id = 1 [(validate.rules).string.min_len = 1];
  string name = 2;
  string description = 3;
  string image_url = 4;
  double price = 5 [(validate.rules).double = {ignore_empty: true, gte: 0}];
  string currency = 6;
}

message DeleteProductRequest {
  string product_id = 1 [(validate.rules).string.min_len = 1];
}

message ListProductsRequest {
  string merchant_id = 1 [(validate.rules).string.min_len = 1];
  catalog.v1.types.enums.ProductSortBy sort_by = 2;
  double min_price = 3 [(validate.rules).double.gte = 0];
  double max_price = 4 [(validate.rules).double.gte = 0];
  int64 page_number = 5;
  int64 page_size = 6;
}

message CreateProductImageUploadRequest {
  // MIME type of the image to upload, e.g. "image/jpeg".
  string content_type = 1 [
    (google.api.field_behavior) = REQUIRED,
    (validate.rules).string.min_len = 3
  ];
}
